<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLÜMEO – Customer Ratings & Orders</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/rating-styles.css" />
</head>
<body>
  <div id="app">
    <!-- Page Header -->
    <div class="page-header">
      <h1>🌸 My Orders & Ratings</h1>
      <p>View your orders and rate your experience with BLÜMEO</p>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- API Controls -->
      <div class="api-controls">
        <div>
          <span style="color: var(--text-light); margin-right: 0.5rem;">Using API:</span>
          <span id="api-indicator" class="api-badge api-rest">REST</span>
        </div>
        <button id="toggle-api-btn">Switch to GraphQL</button>
        <button id="refresh-btn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <!-- Orders Container - will be populated by JavaScript -->
      <div id="orders-container">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          Loading orders...
        </div>
      </div>
    </main>
  </div>

  <!-- JavaScript Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
