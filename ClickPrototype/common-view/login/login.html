<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blumeo | Login</title>

    <link rel="stylesheet" href="/ClickPrototype/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main>
      <div class="form-container" id="login-container">
        <h2>Welcome Back 🌸</h2>
        <p class="subtitle">Log in to explore our floral collections</p>

        <form id="login-form">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="example@gmail.com"
            required
          />

          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            placeholder="Enter your password"
            required
          />

          <button type="submit" class="main-btn">Login</button>
        </form>

        <p class="toggle-text">
          No account yet?
          <span
            class="link"
            onclick="window.location.href='/ClickPrototype/common-view/registration/register.html'"
          >
            Register here
          </span>
        </p>

         <div id="form-message" class="form-message" aria-live="polite"></div>
      </div>
    </main>

    <!-- Login Logic -->
    <script type="module" src="./login.js"></script>
  </body>
</html>
