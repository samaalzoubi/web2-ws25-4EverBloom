<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blumeo | Register</title>

    <link rel="stylesheet" href="/ClickPrototype/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body>
    <main>
      <div class="form-container" id="register-container">
        <h2>Create Account 🌷</h2>
        <p class="subtitle">Join our blooming community</p>

        <form id="register-form">
          <label for="register-username">Username</label>
          <input
            type="text"
            id="register-username"
            placeholder="Choose a username"
            required
          />

          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            placeholder="example@gmail.com"
            required
          />

          <label for="register-password">Password</label>
          <input
            type="password"
            id="register-password"
            placeholder="Create password"
            required
          />

          <button type="submit" class="main-btn">Register</button>
        </form>

        <p class="toggle-text">
          Already have an account?
          <span
            class="link"
            onclick="window.location.href='/ClickPrototype/common-view/login/login.html'"
          >
            Back to Login
          </span>
        </p>  
        <div id="form-message" class="form-message" aria-live="polite"></div>
      </div>
    </main>

    <script type="module" src="./registerCustomer.js"></script>
  </body>
</html>
