<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blumeo | Register</title>
    <link rel="stylesheet" href="/ClickPrototype/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  </head>
  <body>
    <!-- Navigation -->
    <div id="header"></div>

    <!-- Role Selection -->
    <div id="role-select" class="form-container" style="text-align:center; padding:30px; border-radius:20px; background:white; max-width:450px; margin:120px auto; box-shadow:0 5px 20px rgba(0,0,0,0.1);">
      <h2 style="margin-bottom:20px; font-size:20px; font-weight:600;">Please choose your account type:</h2>
      <button id="select-user" class="main-btn" onclick="window.location.href='/ClickPrototype/common-view/registration/customer-register.html'">Private</button>
      <button id="select-owner" class="main-btn" onclick="window.location.href='/ClickPrototype/common-view/registration/owner-register.html'">Business</button>
    </div>

    <script>
      fetch("/ClickPrototype/common-view/header/header.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("header").innerHTML = data;
        })
        .catch(err => console.error("Header konnte nicht geladen werden:", err));
    </script>
  </body>
</html>
