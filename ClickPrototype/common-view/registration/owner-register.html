<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blumeo | Owner Register</title>

    <link rel="stylesheet" href="/ClickPrototype/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body>
   <main>
      <div class="form-container" id="register-container">
        <h2>Create Owner Account 🌷</h2>
        <p class="subtitle">Register your flower business</p>

        <form id="register-form" data-role="OWNER">
          <label for="register-username">Username</label>
          <input
            type="text"
            id="register-username"
            placeholder="Choose a username"
            required
          />

          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            placeholder="example@gmail.com"
            required
          />

          <label for="register-password">Password</label>
          <input
            type="password"
            id="register-password"
            placeholder="Create password"
            required
          />

          <h4>Business Information</h4>

          <label for="business-name">Shop Name</label>
          <input type="text" id="business-name" required />

          <label for="business-address">Shop Address</label>
          <input type="text" id="business-address" required />

          <label>Upload Certificate</label>
          <input type="file" id="business-certificate" accept="image/*,application/pdf" required>

          <label>Logo Upload</label>
          <input type="file" id="business-logo" accept="image/*" required>

          <label for="business-offer">What do you offer?</label>
          <textarea  
            id="business-offer"
            class="form-textarea"
            placeholder="Describe your services or products..."
          ></textarea>

          <label for="business-hours">Opening Hours</label>
          <input type="text" id="business-hours"  placeholder="For example 10:00 - 22:00"/>

          <label for="business-phone">Phone Number</label>
          <input type="text" id="business-phone" />

          <label for="business-social">Website / Social Media</label>
          <input type="text" id="business-social" />

          <label for="business-type">Flower Shop Type</label>
          <div class="select-wrapper">
          <select id="business-type" required>
            <option value="bouquet">Bouquet Shop</option>
            <option value="wedding">Wedding Flowers</option>
            <option value="event">Event Decoration</option>
            <option value="garden">Garden Plants</option>
            <option value="houseplants">Houseplants</option>
            <option value="mixed">Mixed Flower Shop</option>
            <option value="other">Other</option>
          </select>
          </div>

          <label for="business-delivery" required>Delivery Options</label>
          <div class="select-wrapper">
          <select id="business-delivery">
            <option value="pickup">Pickup Only</option>
            <option value="delivery">Delivery Available</option>
            <option value="both">Pickup & Delivery</option>
          </select>
          </div>

          <button type="submit" class="main-btn">Register</button>
        </form>

        <p class="toggle-text">
          Already have an account?
          <span
            class="link"
            onclick="window.location.href='/ClickPrototype/common-view/login/login.html'"
          >
            Back to Login
          </span>
        </p>
        <div id="form-message" class="form-message" aria-live="polite"></div>
      </div>
    </main>

    <script type="module" src="./registerOwner.js"></script>
  </body>
</html>
