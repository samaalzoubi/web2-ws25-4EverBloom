<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blumeo | Login</title>
    <link rel="stylesheet" href="/ClickPrototype/common-view/header/header.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  </head>

  <body>
    <header id="header">
      <a href="#" id="logo-link">
        <div class="logo">
          <img src="/ClickPrototype/assets/Logo.png" alt="Flower Logo" width="70" height="70" />
          <div class="logo-text-part">
            <h1>BLÜMEO</h1>
            <h3>Design. Bloom. Inspire</h3>
          </div>
        </div>
      </a>

      <a id="login-link" class="login-btn" href="/ClickPrototype/common-view/login/login.html">
        Login
      </a>


      <nav>
        <div class="design-bouquet hidden">
          <a class="user-links" href="" title="Design a Bouquet">
            <span class="fx-3d">3D</span>esign Bouquet 🪄
          </a>
        </div>

        <a class="user-links cart-link hidden" href="#" title="Cart">
          <span class="material-symbols-outlined">shopping_cart</span>
          <span class="cart-count">0</span>
        </a>

        <div class="dropdown user-links">
          <span class="material-symbols-outlined">account_circle</span>

          <div class="dropdown-content">
            <a href="/ClickPrototype/customer-view/orders/customer_orders.html" class="option-btn customer-only">My Orders</a>
            <a href="/ClickPrototype/customer-view/customer-profile/profile.html" class="option-btn customer-only">View Profile</a>
            <a href="/ClickPrototype/common-view/login/login.html" class="option-btn logout-link">Logout</a>
          </div>
        </div>
      </nav>
    </header>

    <div class="cart">
        <div class="clear-cart">
            <h2>CART</h2>
            <div class="clear">
                <a id="clearCartBtn" class="clear-cart-btn">🗑️ CLEAR CART</a>
            </div>
        </div>
        <div class="list-cart">
        </div>
        <div class="buttons">
            <div class="close">CLOSE</div>
            <div class="checkout">
                <a id="checkoutBtn">CHECKOUT</a>
            </div>
        </div>
    </div>
  </body>
</html>
