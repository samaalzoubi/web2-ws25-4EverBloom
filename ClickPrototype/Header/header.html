<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blumeo | Login</title>
    <link rel="stylesheet" href="header.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  </head>

  <body>
    <!-- Header (Teil deiner Seite) -->
    <header>
      <a href="../customer/home-page/home-page.html">
        <div class="logo">
          <img src="../assets/Logo.png" alt="Flower Logo" width="70" height="70" />
          <div class="logo-text-part">
            <h1>BLÜMEO</h1>
            <h3>Design. Bloom. Inspire</h3>
          </div>
        </div>
      </a>

      <nav>
        <div class="design-bouquet hidden">
          <a class="user-links" href="/Customer/DesignBouquet.html" title="Design a Bouquet">
            <span class="fx-3d">3D</span>esign Bouquet 🪄
          </a>
        </div>

        <a class="user-links cart-link hidden" href="" title="Cart">
          <span class="material-symbols-outlined">shopping_cart</span>
          <span class="cart-count">0</span>
        </a>

        <div class="dropdown">
          <span class="material-symbols-outlined">account_circle</span>

          <div class="dropdown-content">
            <a href="/Profile/profile.html" class="option-btn">View Profile</a>
            <a href="/Login/Login.html" class="option-btn">Logout</a>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
