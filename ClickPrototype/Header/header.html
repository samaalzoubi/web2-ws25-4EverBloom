<html lang="en">
  <head>
    <meta charset="UTF-8" />

  </head>
  <header>
    <a href="/web2-ws25-4EverBloom/customer/home-page/home-page.html">
      <div class="logo">
        <img src="/web2-ws25-4EverBloom/assets/Logo.png" alt="Flower Logo" width="70" height="70">
        <div class="logo-text-part">
          <h1>BLÜMEO</h1>
          <h3>Design. Bloom. Inspire</h3>
        </div>
      </div>
    </a>

    <nav>
      <a href="/web2-ws25-4EverBloom/customer/home-page/home-page.html">Home</a>
      <a href="/web2-ws25-4EverBloom/Chat/4EverBloom_chat.html">Chat</a>
      <a id="login-link" href="/web2-ws25-4EverBloom/Login/Login.html">Login</a>

      <div class="design-bouquet hidden">
        <a class="user-links" href="/web2-ws25-4EverBloom/Customer/DesignBouquet.html" title="Design a Bouquet">
        <span class="fx-3d">3D</span>esign Bouquet 🪄
        </a>
      </div>
      <a class="user-links cart-link hidden" href="" title="Cart">
        <span class="material-symbols-outlined">shopping_cart</span>

      <a id="userMenuButton" href="#">
        <span class="material-symbols-outlined">account_circle</span>

      <div id="userMenu" class="user-menu">
        <div class="profile-pic">
          <img id="profileImage" src="" alt="Profile Image" class="hidden">
        </div>
        <p id="userEmail"></p> 
        <a href="/web2-ws25-4EverBloom/Profile/profile.html" class="option-btn">View Profile</a>

<script>
const userEmail = "example@gmail.com"; 
  document.getElementById('userEmail').textContent = userEmail;

const userMenuButton = document.getElementById('userMenuButton');
const userMenu = document.getElementById('userMenu');

// Menü öffnen/schließen beim Klick aufs Icon
userMenuButton.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation(); // verhindert, dass das Klick-Event sofort schließt
  userMenu.classList.toggle('show');
});

// Klick außerhalb -> Menü schließen
document.addEventListener('click', (e) => {
  if (!userMenu.contains(e.target) && !userMenuButton.contains(e.target)) {
    userMenu.classList.remove('show');
  }
});

</script>
