<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="/ClickPrototype/Style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <div class="checkoutLayout">
            <div class="returnCart">
                <a href="/ClickPrototype/customer/home-page/home-page.html">Keep shopping</a>
                <h1>List Product in Cart</h1>
                <div class="list">
                    <div class="item">
                        <img src="/ClickPrototype/assets/bouquet1.png" alt="">
                        <div class="info">
                            <div class="name">Amaryllis Bouquet</div>
                            <div class="price">€45/1 bouquet</div>
                        </div>
                        <div class="quantity">1</div>
                    </div>
                    <div class="item">
                        <img src="/ClickPrototype/assets/bouquet2.png" alt="">
                        <div class="info">
                            <div class="name">Dried Vanilla Sky</div>
                            <div class="price">€49/1 bouquet</div>
                        </div>
                        <div class="quantity">1</div>
                    </div>
                </div>
            </div>

            <div class="checkout">
                <h1>CHECKOUT</h1>
                <form action="" class="checkout-form">
                    <div class="checkout-card">
                        <h2 class="section-title">
                            <span class="icon">👤</span> Contact Information
                        </h2>
                        <div class="form">
                            <div class="group">
                                <label>Full Name</label>
                                <input type="text">
                            </div>
                            <div class="group">
                                <label>Email</label>
                                <input type="text">
                            </div>
                            <div class="group">
                                <label>Phone Number</label>
                                <input type="text">
                            </div>
                        </div>
                    </div>
                    
                    <div class="checkout-card">
                        <h2 class="section-title">
                            <span class="icon">📍</span> Delivery Information
                        </h2>
                        <div class="form">
                            <div class="group">
                                <label>Street Address</label>
                                <input type="text">
                            </div>

                            <div class="group">
                                <label>City</label>
                                <input type="text">
                            </div>
                            <div class="group">
                                <label>State</label>
                                <select>
                                    <option>Select state</option>
                                    <option value="Baden-Württemberg">Baden-Württemberg</option>
                                    <option value="Bavaria">Bavaria</option>
                                    <option value="Berlin">Berlin</option>
                                    <option value="Brandenburg">Brandenburg</option>
                                    <option value="Bremen">Bremen</option>
                                    <option value="Hamburg">Hamburg</option>
                                    <option value="Hesse">Hesse</option>
                                    <option value="Mecklenburg-Vorpommern">Mecklenburg-Vorpommern</option>
                                    <option value="Lower Saxony">Lower Saxony</option>
                                    <option value="North Rhine-Westphalia">North Rhine-Westphalia</option>
                                    <option value="Rhineland-Palatinate">Rhineland-Palatinate</option>
                                    <option value="Saarland">Saarland</option>
                                    <option value="Saxony">Saxony</option>
                                    <option value="Saxony-Anhalt">Saxony-Anhalt</option>
                                    <option value="Schleswig-Holstein">Schleswig-Holstein</option>
                                    <option value="Thuringia ">Thuringia</option>
                                </select>
                            </div>
                            <div class="group">
                                <label>ZIP Code</label>
                                <input type="text">
                            </div>
                        </div>
                    </div>

                    <div class="checkout-card">
                        <h2 class="section-title">
                            <span class="icon">💳</span> Payment Information
                        </h2>
                        <div class="form">
                            <div class="group">
                                <label>Card Number</label>
                                <input type="text" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="group">
                                <label>Cardholder Name</label>
                                <input type="text" placeholder="John Doe">
                            </div>
                            <div class="group">
                                <label>Expiry Date</label>
                                <input type="text" placeholder="MM/YY">
                            </div>
                            <div class="group">
                                <label>CVV</label>
                                <input type="text" placeholder="123">
                            </div>
                        </div>
                        <div class="secure-msg">
                            🔒 Secure Payment - Your payment information is encrypted and safe.
                        </div>
                    </div>
                </form>
                
                <div class="return">
                    <div class="row">
                        <div>Total Quantity</div>
                        <div class="totalQuantity">2</div>
                    </div>
                    <div class="row">
                        <div>Total Price</div>
                        <div class="totalPrice">€94</div>
                    </div>
                </div>
                <button class="buttonOrder">
                    Place Order
                </button>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script>
        //Fetch header
      fetch("/ClickPrototype/Header/header.html")
        .then(response => response.text())
        .then(data => {
            const mount = document.getElementById('header');
            mount.innerHTML = data;
            initHeader(mount);
            document.dispatchEvent(new Event('header:ready'));
        })
        .catch(err => console.error("Header konnte nicht geladen werden:", err));

        function initHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            const loginLink = document.querySelector('#login-link');
            const userLinks = document.querySelectorAll('.user-links');
            const designBouquetButton = document.querySelector('.design-bouquet')

            if (isLoggedIn) {
                loginLink?.classList.add('hidden');
                userLinks.forEach(el => el.classList.remove('hidden'));
                designBouquetButton?.classList.remove('hidden');
            } else {
                loginLink?.classList.remove('hidden');
                userLinks.forEach(el => el.classList.add('hidden'));
                designBouquetButton?.classList.add('hidden');
            }

            // Logout-Handler
            const logout = document.querySelector('.logout-link');
            if (logout) {
                logout.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.setItem('isLoggedIn', "false");
                localStorage.removeItem('login-email');
                localStorage.removeItem('login-password');
                localStorage.removeItem('cartItems');
                localStorage.removeItem('totalCartQuantity');
                window.location.href = '/ClickPrototype/customer/home-page/home-page.html';
                });
            }
        }

        //Fetch footer
        fetch("/ClickPrototype/footer/footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer').innerHTML = data;
        })
        .catch(err => console.error("Footer konnte nicht geladen werden:", err));
    </script>
</body>
</html>
