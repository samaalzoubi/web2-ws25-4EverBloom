<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blumeo | Login & Register</title>
    <link rel="stylesheet" href="/web2-ws25-4EverBloom/ClickPrototype/Style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  </head>
  <body>
    <!-- Navigation -->
       <div id="header"></div>

    <!-- Main Content -->
    <main>
      <!-- Login Box -->
      <div class="form-container" id="login-container">
        <h2>Welcome Back 🌸</h2>
        <p class="subtitle">Log in to explore our floral collections</p>
        <form id="login-form">
          <label>Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="example@gmail.com"
            required
          >
          <label>Password</label>
          <input
            type="password"
            id="login-password"
            placeholder="Enter your password"
            required
          >
          <button type="submit" class="main-btn">Login</button>
        </form>
        <p class="toggle-text">
          No account yet?
          <span id="show-register">Register here</span>
        </p>
      </div>

      <!-- Register Box -->
      <div class="form-container hidden" id="register-container">
        <h2>Create Account 🌷</h2>
        <p class="subtitle">Join our blooming community</p>
        <form id="register-form">
          <label>Username</label>
          <input
            type="text"
            id="register-username"
            placeholder="Choose a username"
            required
          >
          <label>Email</label>
          <input
            type="email"
            id="register-email"
            placeholder="example@gmail.com"
            required
          >
          <label>Password</label>
          <input
            type="password"
            id="register-password"
            placeholder="Create password"
            required
          >
          <button type="submit" class="main-btn">Register</button>
        </form>
        <p class="toggle-text">
          Already have an account?
          <span id="show-login">Back to Login</span>
        </p>
      </div>
    </main>

    <script>
      const loginContainer = document.getElementById("login-container");
      const registerContainer = document.getElementById("register-container");
      const showRegister = document.getElementById("show-register");
      const showLogin = document.getElementById("show-login");

      fetch("/web2-ws25-4EverBloom/ClickPrototype/Header/header.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("header").innerHTML = data;
        })
        .catch(err => console.error("Header konnte nicht geladen werden:", err));

      showRegister.addEventListener("click", () => {
        loginContainer.classList.add("hidden");
        registerContainer.classList.remove("hidden");
      });

      showLogin.addEventListener("click", () => {
        registerContainer.classList.add("hidden");
        loginContainer.classList.remove("hidden");
      });

      // Demo logic: save users in localStorage
      document
        .getElementById("register-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const username = document.getElementById("register-username").value;
          const email = document.getElementById("register-email").value;
          const password = document.getElementById("register-password").value;

          localStorage.setItem(email, JSON.stringify({ username, password }));
          alert("Account created successfully! You can now log in.");
          e.target.reset();
          showLogin.click();
        });

      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const storedUser = JSON.parse(localStorage.getItem(email));

        if (storedUser && storedUser.password === password) {
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "/web2-ws25-4EverBloom/ClickPrototype/customer/home-page/home-page.html";
        } else {
          alert("Invalid email or password. Please try again.");
        }
      });
    </script>
  </body>
</html>
