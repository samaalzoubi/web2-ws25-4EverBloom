<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blümeo | Manage Bouquets</title>

  <!-- Global + Page CSS -->
  <link rel="stylesheet" href="/ClickPrototype/style.css">
  <link rel="stylesheet" href="manage-bouquets.css">

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body data-page="owner">

  <!-- Header injected by layout.js -->
  <div id="header"></div>

  <main class="bouquet-wrapper">

    <a href="/ClickPrototype/shop-owner-view/home-page/shop-owner-homepage.html" class="back-link">
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Home
    </a>

    <div class="title-block">
      <h2>Manage Bouquets</h2>
      <p>Organize and update your bouquet creations.</p>
    </div>

    <div class="action-row">
      <a href="#" id="toggle-create" class="add-btn">
        <span class="material-symbols-outlined">add</span>
        Create New Bouquet
      </a>

    </div>

    <!-- CREATE FORM -->
<form id="create-bouquet-form" class="create-form" style="display:none;">
  <input id="bouquetName" placeholder="Bouquet name" required />
  <input id="imageUrl" placeholder="Image URL" required />
  <input id="price" type="number" step="0.01" placeholder="Price (€)" required />
  <textarea id="description" placeholder="Description"></textarea>
  <button type="submit">Save Bouquet</button>
</form>
    <!-- CSR TARGET -->
    <section class="bouquet-grid"></section>

  </main>

  <div id="footer"></div>

  <!-- Layout loader -->
  <script type="module">
    import { loadLayout } from "/ClickPrototype/layout/layout.js";
    document.addEventListener("DOMContentLoaded", loadLayout);
  </script>

  <!-- PAGE LOGIC -->
  <script type="module" src="./manage-bouquets.js"></script>

</body>
</html>
