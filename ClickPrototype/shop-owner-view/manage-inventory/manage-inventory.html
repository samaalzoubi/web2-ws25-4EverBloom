<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blümeo | Manage Inventory</title>

  <link rel="stylesheet" href="/ClickPrototype/style.css">
  <link rel="stylesheet" href="manage-inventory.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body data-page="owner">

<div id="header"></div>

<main class="inventory-wrapper">

  <section class="inventory-content">

    <a href="/ClickPrototype/shop-owner-view/home-page/shop-owner-homepage.html" class="back-link">
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Home
    </a>

    <div class="title-block">
      <h2>Inventory</h2>
      <p>Track and manage your flower stems and stock levels.</p>
    </div>

    <div class="action-row">
      <button id="toggle-create" class="add-btn">
        <span class="material-symbols-outlined">add</span>
        Add New Item
      </button>
    </div>

    <!-- CREATE FORM -->
    <form id="create-form" class="create-form" style="display:none;">
      <input id="flowerName" placeholder="Flower name" required />
      <input id="flowerColor" placeholder="Color" required />
      <input id="flowerSeason" placeholder="Season" required />
      <input id="imageUrl" placeholder="Image URL" required />
      <input id="price" type="number" step="0.01" placeholder="Price (€)" required />
      <input id="quantity" type="number" placeholder="Quantity" required />
      <button type="submit">Save Item</button>
    </form>

    <!-- INVENTORY TABLE (CSR TARGET) -->
    <div class="inventory-table">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Color</th>
            <th>Season</th>
            <th>Quantity</th>
            <th>Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inventory-body"></tbody>
      </table>
    </div>

  </section>

</main>

<div id="footer"></div>

<script type="module">
  import { loadLayout } from "/ClickPrototype/layout/layout.js";
  document.addEventListener("DOMContentLoaded", loadLayout);
</script>

<script type="module" src="./manage-inventory.js"></script>

</body>
</html>
