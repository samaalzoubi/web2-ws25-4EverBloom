<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Profil – Flowerly</title>
  <link rel="stylesheet" href="ownerProfile.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-content">
        <h1 class="logo">BLÜMEO</h1>
        <h1 class="title">Partnerbereich</h1>
        <button class="logout-btn">Abmelden</button>
    </div>
  </header>

  <main class="main">
    <section class="owner-profile">
      <img src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png" alt="Profilbild" class="owner-img">
      <div>
        <h2>4EverBloom</h2>
        <p>Verwalte deine Läden & Produkte ganz einfach 🌸</p>
      </div>
    </section>

    <section class="card add-shop">
      <h3>Laden hinzufügen</h3>
      <form class="form">
        <div class="form-group">
          <label>Shop-Name</label>
          <input type="text" placeholder="z.B. Rosenduft & Co" required>
        </div>

        <div class="form-group">
          <label>Adresse</label>
          <input type="text" placeholder="z.B. Hauptstraße 12, Berlin" required>
        </div>

        <div class="form-group">
          <label>Beschreibung</label>
          <textarea rows="3" placeholder="Kurze Beschreibung deines Blumengeschäfts..."></textarea>
        </div>

        <div class="form-group">
          <label>Shop-Bild</label>
          <input type="file" accept="image/*">
        </div>

        <button type="submit" class="btn-primary">💐 Laden speichern</button>
      </form>
    </section>

    <section class="card my-shops">
      <h3>Meine Läden</h3>
      <div class="shop-list">
        <div class="shop-item">
          <div class="shop-info">
            <h4>Rosenduft & Co</h4>
            <p>Berlin • seit 2023</p>
          </div>
          <button class="edit-btn">Bearbeiten</button>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

</body>
</html>

<script>
     //Fetch footer
        fetch("/Application/web2-ws25-4EverBloom/ClickPrototype/footer/footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById('footer').innerHTML = data;
        })
        .catch(err => console.error("Footer konnte nicht geladen werden:", err));


</script>
