<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blümeo | Florist Profile</title>

  <link rel="stylesheet" href="/ClickPrototype/style.css">
  <link rel="stylesheet" href="shop-profile.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div id="header"></div>

  <!-- ===== SHOP INFO ===== -->
  <main>
    <section class="shop-info">

      <div class="shop-details"></div>


      <button id="ownerDashboardBtn" class="main-btn hidden">
        Go to Shop Owner Dashboard
      </button>

    </section>

    <!-- ===== NAVIGATION TABS ===== -->
<nav class="shop-tabs">
  <a href="#" class="active">Catalog</a>
  <a href="#" class="disabled">About</a>
  <a href="#" class="disabled">Subscriptions</a>
  <a href="#" class="disabled">Reviews (85)</a>
  <a href="#" class="disabled">Delivery Info</a>
</nav>

    <!-- ===== BOUQUETS GRID ===== -->
    <section class="bouquet-section">
      <h2>Catalog</h2>
      <div class="bouquet-grid"></div>
    </section>
  </main>

  <!-- Chatbot -->
  <div id="chatbot" class="chatbot">
    <div class="chatbot-header">
      💬 BLÜMEO Assistant
      <span class="chatbot-close">✖</span>
    </div>
    <div class="chatbot-body">
      <div class="chatbot-message bot">
        Hello and welcome to BLÜMEO 🌷 I'm your virtual floral assistant.
      </div>
    </div>
    <div class="chatbot-input">
      <input type="text" placeholder="Ask about bouquets..." />
      <button><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <button class="chatbot-toggle">💬</button>

  <div id="footer"></div>

  <!-- Chatbot Script (unchanged) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const chatbot = document.getElementById('chatbot');
      const chatbotToggle = document.querySelector('.chatbot-toggle');
      const chatbotClose = document.querySelector('.chatbot-close');

      chatbotToggle.addEventListener('click', () => chatbot.classList.toggle('open'));
      chatbotClose.addEventListener('click', () => chatbot.classList.remove('open'));
    });
  </script>

  <!-- Page Logic -->
  <script type="module" src="./shop-profile.js"></script>

</body>
</html>
