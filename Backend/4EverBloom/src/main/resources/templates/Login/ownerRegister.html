<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blumeo | Register</title>
    <link rel="stylesheet"  type="text/css" href="/style/Style.css">
    <link rel="stylesheet"  type="text/css" href="/style/header.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>
<body>

<main>
    <div class="form-container" id="register-container">
        <h2>Create Business Account</h2>

        <!-- REGISTRATION FORM -->
        <form th:action="@{/owner/create}" th:object="${registerRequest}" method="post">
            <label>Username</label>
            <label>
                <input type="text" th:field="*{username}" placeholder="Choose a username" required>
            </label>

            <label>Email</label>
            <label>
                <input type="email" th:field="*{email}" placeholder="example@gmail.com" required>
            </label>

            <label>Password</label>
            <label>
                <input type="password" th:field="*{password}" placeholder="Create password" required>
            </label>

            <label>
                <input type="text" th:field="*{shopname}" placeholder="Write the shopname" required>
            </label>

            <label>
                <input type="text" th:field="*{shopAdress}" placeholder="e. g. Muster straße 5, 12345 Dortmund" required>
            </label>

            <label>
                <input type="text" th:field="*{offer}" placeholder="Describe your services or products" required>
            </label>

            <label>
                <input type="file" th:field="*{certificate}" placeholder="Certificate" required>
            </label>

            <label>
                <input type="date" th:field="*{openingsHours}" placeholder="e.g. Mon–Fri: 09:00–18:00" required>
            </label>

            <label>
                <input type="number" th:field="*{number}" placeholder="Contact number"  required>
            </label>

            <label>
                <input type="link" th:field="*{weblink}" placeholder="Website or Instagram page" required>
            </label>

            <label>
                <input type="text" th:field="*{flowerType}" required>
            </label>

            <label>Flower Shop Type
                <select>
                    <option value="">Select type</option>
                    <option value="bouquet">Bouquet Shop</option>
                    <option value="wedding">Wedding Flowers</option>
                    <option value="event">Event Decoration</option>
                    <option value="garden">Garden Plants</option>
                    <option value="houseplants">Houseplants</option>
                    <option value="mixed">Mixed Flower Shop</option>
                    <option value="other">Other</option>
                </select>
                <input type="text" th:field="*{deliveryOption}" required>
            </label>

            <label>
                <select>
                    <option value="pickup">Pickup Only</option>
                    <option value="delivery">Delivery Available</option>
                    <option value="both">Pickup & Delivery</option>
                </select>
                <input type="file" th:field="*{logo}" placeholder="Load your Logo" required>
            </label>



            <button type="submit" class="main-btn">Register</button>
        </form>

        <!-- ERROR MESSAGE -->
        <p th:if="${error}" th:text="${error}" style="color:red;"></p>

        <!-- SUCCESS MESSAGE -->
        <p th:if="${success}" th:text="${success}" style="color:green;"></p>

        <p class="toggle-text">
            Already have an account?
            <span onclick="window.location.href='/users/login'">Back to Login</span>
        </p>
    </div>
</main>
</body>
</html>
