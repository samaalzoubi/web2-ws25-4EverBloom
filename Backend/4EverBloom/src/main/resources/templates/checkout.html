<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="/style/Style.css">
    <link rel="stylesheet" href="/style/checkout.css">
    <link rel="stylesheet" href="/style/header.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>
    <main>
        <div class="checkoutLayout">
            <div class="returnCart">
                <a href="/customer/home-page/home-page.html">Keep shopping</a>
                <h1>List Product in Cart</h1>
                <div class="list" th:each="cartItem : ${cart.items}">
                    <div class="item">
                        <img src="/assets/bouquets/bouquet1.png" alt="">
                        <div class="info">
                            <div class="name" th:text="${cartItem.bouquetName}">Amaryllis Bouquet</div>
                            <div class="price" th:text="${'€' + item.unitPrice + '/1 bouquet'}">€45/1 bouquet</div>
                        </div>
                        <div class="quantity" th:text="${cartItem.quantity}">1</div>
                    </div>
                </div>
            </div>

            <div class="checkout">
                <h1>CHECKOUT</h1>
                <div class="form">
                    <div class="group">
                        <label for="">Full Name</label>
                        <input type="text">
                    </div>
                    <div class="group">
                        <label for="">Phone Number</label>
                        <input type="text">
                    </div>
                    <div class="group">
                        <label for="">Address</label>
                        <input type="text">
                    </div>
                    <div class="group">
                        <label for="">Country</label>
                        <select name="" id="">
                            <option value="">Choose...</option>
                            <option value="">Germany</option>
                        </select>
                    </div>
                    <div class="group">
                        <label for="">City</label>
                        <select name="" id="">
                            <option value="">Choose...</option>
                            <option value="">Dortmund</option>
                            <option value="">Bochum</option>
                            <option value="">Düsseldorf</option>
                            <option value="">Köln</option>
                        </select>
                    </div>
                </div>
                <div class="return">
                    <div class="row">
                        <div>Total Quantity</div>
                        <div class="totalQuantity" th:text="${cart.totalQuantity}">2</div>
                    </div>
                    <div class="row">
                        <div>Total Price</div>
                        <div class="totalPrice" th:text="${'€' + cart.totalPrice}">€94</div>
                    </div>
                </div>
                <button class="buttonOrder">
                    ORDER
                </button>
            </div>
        </div>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
