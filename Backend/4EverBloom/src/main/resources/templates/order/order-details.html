<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" href="/style/order.css">
</head>

<body>

<!-- HEADER -->
<!-- <div th:replace="fragments/header :: header"></div> -->

<h1>Order Details</h1>

<div class="order-info">
    <p><b>Order ID:</b> <span th:text="${order.orderId}"></span></p>
    <p><b>Status:</b> <span th:text="${order.status}"></span></p>

    <p th:if="${order.orderDate}">
        <b>Order Date:</b> <span th:text="${order.orderDate}"></span>
    </p>



    <p><b>Address:</b> <span th:text="${order.deliveryAddress}"></span></p>
</div>

<h2>Items</h2>

<table>
    <thead>
        <tr>
            <th>Bouquet</th>
            <th>Quantity</th>
            <th>Price (€)</th>
            <th>Total (€)</th>
        </tr>
    </thead>
    <tbody>
<tr th:each="line : ${orderLines}">
    <td th:text="${line.bouquetName}"></td>
    <td th:text="${line.quantity}"></td>

    <!-- Unit Price -->
    <td>
      <td th:text="${line.priceFormatted}"></td>
    </td>

    <!-- Total Price -->
    <td>
     <td th:text="${line.lineTotalFormatted}"></td>
    </td>
</tr>
</tbody>
</table>

<h3>Total Amount:
   <span th:text="${order.totalAmountFormatted}"></span>
</h3>


<!-- FOOTER -->
<!-- <div th:replace="fragments/footer :: footer"></div> -->

</body>
</html>
