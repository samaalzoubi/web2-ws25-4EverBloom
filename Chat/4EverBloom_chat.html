<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blümeo Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --color-header-background: #ff85a2;
        --color-background: #fafafa;
        --color-user: #ffd1dc;
        --color-bot: #e1f7d5;
        --color-button: #ff85a2;
        --color-button-hover: #ff61c5;
    }

    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #f2e4f9, #d4bdf0);
    }

    /* Floating Chat Button */
    .chat-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: var(--color-button);
        color: white;
        padding: 15px 20px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.3s;
        z-index: 1000;
    }

    .chat-btn:hover {
        transform: scale(1.1);
    }

    /* Chat Container (pop-up) */
    .chat-container {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 350px;
        max-height: 500px;
        display: none;
        flex-direction: column;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
        background-color: #ffffff;
        animation: slideUp 0.3s ease;
        z-index: 1000;
    }

    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* Header */
    .chat-header {
        padding: 15px 20px;
        background-color: var(--color-header-background);
        color: white;
        font-size: 18px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header span {
        cursor: pointer;
        font-weight: bold;
    }

    /* Chat Messages Area */
    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-color: var(--color-background);
    }

    .user, .bot {
        padding: 12px 16px;
        border-radius: 20px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 14px;
        line-height: 1.5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .user {
        background-color: var(--color-user);
        align-self: flex-end;
    }

    .bot {
        background-color: var(--color-bot);
        align-self: flex-start;
    }

    /* Input Area */
    .input-container {
        display: flex;
        border-top: 1px solid #eee;
        padding: 10px;
        background-color: #fff;
    }

    input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #eee;
        border-radius: 20px 0 0 20px;
        outline: none;
        font-size: 14px;
    }

    button {
        width: 50px;
        border: none;
        background-color: var(--color-button);
        color: white;
        cursor: pointer;
        border-radius: 0 20px 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.3s;
    }

    button:hover {
        background-color: var(--color-button-hover);
    }

    .send-icon {
        width: 20px;
        height: 20px;
        fill: white;
    }

    .chat-box::-webkit-scrollbar {
        width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
        background-color: rgba(0,0,0,0.1);
        border-radius: 3px;
    }
</style>
</head>
<body>

<!-- Floating Chat Button -->
<div class="chat-btn" id="chatBtn">💬 Chat</div>

<!-- Chat Container -->
<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        Blümeo Bot 🌸
        <span id="closeBtn">✖</span>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">
            <svg class="send-icon" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const chatBtn = document.getElementById('chatBtn');
    const chatContainer = document.getElementById('chatContainer');
    const closeBtn = document.getElementById('closeBtn');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // Toggle chat visibility
    chatBtn.addEventListener('click', () => {
        chatContainer.style.display = chatContainer.style.display === 'flex' ? 'none' : 'flex';
    });

    closeBtn.addEventListener('click', () => {
        chatContainer.style.display = 'none';
    });

    // Send message
    function sendMessage() {
        const input = userInput.value.trim();
        if(input === "") return;

        appendMessage(input, 'user');
        userInput.value = '';

        setTimeout(() => {
            const botResponse = getBotResponse(input);
            appendMessage(botResponse, 'bot');
        }, 500);
    }

    function appendMessage(message, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add(sender);
        msgDiv.textContent = message;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getBotResponse(input) {
        input = input.toLowerCase();
        if(input.includes('hello') || input.includes('hi')) {
            return "Hello! Welcome to 4EverBloom 🌸 How can I help you today?";
        } 
        else if (input.includes('can i ask you a question') || input.includes('i have a question')) {
            return "Yes of course, what is your question?";
        }
        else if(input.includes('flowers') || input.includes('bouquet')) {
            return "We have a variety of flowers! Roses, lilies, tulips, and more. Would you like to see our bestsellers?";
        } 
        else if(input.includes('price') || input.includes('cost')) {
            return "Our prices vary depending on the bouquet. Most start from $20. Do you want details on a specific flower?";
        } 
        else if(input.includes('thanks') || input.includes('thank you')) {
            return "You're welcome! Happy to help 🌷";
        } 
        else {
            return "I'm sorry, I didn't understand that. Could you please rephrase?";
        }
    }

    // Enter key sends message
    userInput.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
            sendMessage();
            e.preventDefault();
        }
    });
</script>
</body>
</html>
