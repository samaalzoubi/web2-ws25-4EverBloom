<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4EverBloom Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffe6f0, #fff1f7);
    }

    /* Slim chat container */
    .chat-container {
        display: flex;
        flex-direction: column;
        height: 70%;
        width: 80%;
        max-width: 500px;
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    /* Header with chatbot name */
    .chat-header {
        padding: 15px 20px;
        background-color: #ff85a2;
        color: white;
        font-size: 18px;
        font-weight: 600;
        border-radius: 20px 20px 0 0;
        text-align: center;
    }

    /* Chat messages area */
    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-color: #fafafa;
    }

    .user, .bot {
        padding: 12px 16px;
        border-radius: 20px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 14px;
        line-height: 1.5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .user {
        background-color: #ffd1dc;
        align-self: flex-end;
    }

    .bot {
        background-color: #e1f7d5;
        align-self: flex-start;
    }

    /* Input area at bottom */
    .input-container {
        display: flex;
        border-top: 1px solid #eee;
        padding: 10px;
        background-color: #fff;
    }

    input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #eee;
        border-radius: 20px 0 0 20px;
        outline: none;
        font-size: 14px;
    }

    button {
        width: 50px;
        border: none;
        background-color: #ff85a2;
        color: white;
        cursor: pointer;
        border-radius: 0 20px 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.3s;
    }

    button:hover {
        background-color: #ff6188;
    }

    
    .chat-box::-webkit-scrollbar {
        width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
        background-color: rgba(0,0,0,0.1);
        border-radius: 3px;
    }

    /* Send icon */
    .send-icon {
        width: 20px;
        height: 20px;
        fill: white;
    }
</style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">4EverBloom Bot 🌸</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-container">
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button onclick="sendMessage()">
            <!-- Send icon SVG -->
            <svg class="send-icon" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInputField = document.getElementById('user-input');

    function sendMessage() {
        const userInput = userInputField.value.trim();
        if(userInput === "") return;

        appendMessage(userInput, 'user');
        userInputField.value = '';

        setTimeout(() => {
            const botResponse = getBotResponse(userInput);
            appendMessage(botResponse, 'bot');
        }, 500);
    }

    function appendMessage(message, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add(sender);
        messageDiv.textContent = message;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getBotResponse(input) {
        input = input.toLowerCase();
        if(input.includes('hello') || input.includes('hi')) {
            return "Hello! Welcome to 4EverBloom 🌸 How can I help you today?";
        } else if(input.includes('flowers') || input.includes('bouquet')) {
            return "We have a variety of flowers! Roses, lilies, tulips, and more. Would you like to see our bestsellers?";
        } else if(input.includes('price') || input.includes('cost')) {
            return "Our prices vary depending on the bouquet. Most start from $20. Do you want details on a specific flower?";
        } else if(input.includes('thanks') || input.includes('thank you')) {
            return "You're welcome! Happy to help 🌷";
        } else {
            return "I'm sorry, I didn't understand that. Could you please rephrase?";
        }
    }

    
    userInputField.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
            sendMessage();
            e.preventDefault();
        }
    });
</script>
</body>
</html>
