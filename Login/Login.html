<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    
  <link rel="stylesheet" href="style.css" />
  <title>BLÜMEO | Login & Register</title>
</head>
<body>

  <div class="container">
    <div class="logo">BLÜMEO </div>

    <!-- LOGIN FORM -->
    <form id="login-form">
      <h2>Welcome Back!</h2>
      <input type="text" id="login-username" placeholder="Username" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit">Login</button>
      <div class="toggle-text">
        Don’t have an account? <span id="show-register">Sign up</span>
      </div>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="hidden">
      <h2>Create Account</h2>
      <input type="text" id="register-username" placeholder="Choose a username" required>
      <input type="email" id="register-email" placeholder="Email address" required>
      <input type="password" id="register-password" placeholder="Create password" required>
      <button type="submit">Register</button>
      <div class="toggle-text">
        Already have an account? <span id="show-login">Login</span>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const showRegister = document.getElementById("show-register");
    const showLogin = document.getElementById("show-login");

    showRegister.addEventListener("click", () => {
      loginForm.classList.add("hidden");
      registerForm.classList.remove("hidden");
    });

    showLogin.addEventListener("click", () => {
      registerForm.classList.add("hidden");
      loginForm.classList.remove("hidden");
    });

    // Simple localStorage simulation (for demo purposes)
    registerForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const username = document.getElementById("register-username").value;
      const password = document.getElementById("register-password").value;

      localStorage.setItem(username, password);
      alert("Account created successfully! You can now log in.");
      registerForm.reset();
      showLogin.click();
    });

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;
      const storedPassword = localStorage.getItem(username);

      if (storedPassword === password) {
        alert(`Welcome back, ${username}! 🌸`);
      } else {
        alert("Invalid username or password. Please try again.");
      }
    });
  </script>

</body>
</html>
