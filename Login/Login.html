<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blumeo | Login & Register</title>
    <link rel="stylesheet" href="../scss/main.css" />
  </head>
  <body>
    <div id="header"></div>

    <main class="auth">
      <!-- Login -->
      <section class="auth__container auth__container--login" id="login-container">
        <h2 class="auth__title">Welcome Back 🌸</h2>
        <p class="auth__subtitle">Log in to explore our floral collections</p>
        <form class="auth__form" id="login-form">
          <label class="auth__label">Email</label>
          <input
            type="email"
            id="login-email"
            class="auth__input"
            placeholder="example@gmail.com"
            required
          />
          <label class="auth__label">Password</label>
          <input
            type="password"
            id="login-password"
            class="auth__input"
            placeholder="Enter your password"
            required
          />
          <button type="submit" class="auth__btn auth__btn--main">Login</button>
        </form>
        <p class="auth__toggle">
          No account yet?
          <span id="show-register" class="auth__link">Register here</span>
        </p>
      </section>

      <!-- Register -->
      <section class="auth__container auth__container--register hidden" id="register-container">
        <h2 class="auth__title">Create Account 🌷</h2>
        <p class="auth__subtitle">Join our blooming community</p>
        <form class="auth__form" id="register-form">
          <label class="auth__label">Username</label>
          <input
            type="text"
            id="register-username"
            class="auth__input"
            placeholder="Choose a username"
            required
          />
          <label class="auth__label">Email</label>
          <input
            type="email"
            id="register-email"
            class="auth__input"
            placeholder="example@gmail.com"
            required
          />
          <label class="auth__label">Password</label>
          <input
            type="password"
            id="register-password"
            class="auth__input"
            placeholder="Create password"
            required
          />
          <button type="submit" class="auth__btn auth__btn--main">Register</button>
        </form>
        <p class="auth__toggle">
          Already have an account?
          <span id="show-login" class="auth__link">Back to Login</span>
        </p>
      </section>
    </main>

    <script>
      const loginContainer = document.getElementById("login-container");
      const registerContainer = document.getElementById("register-container");
      const showRegister = document.getElementById("show-register");
      const showLogin = document.getElementById("show-login");

      fetch("/web2-ws25-4EverBloom/Header/header.html")
        .then(res => res.text())
        .then(data => (document.getElementById("header").innerHTML = data))
        .catch(err => console.error("Header konnte nicht geladen werden:", err));

      showRegister.addEventListener("click", () => {
        loginContainer.classList.add("hidden");
        registerContainer.classList.remove("hidden");
      });

      showLogin.addEventListener("click", () => {
        registerContainer.classList.add("hidden");
        loginContainer.classList.remove("hidden");
      });

      // --- LocalStorage Demo ---
      document.getElementById("register-form").addEventListener("submit", e => {
        e.preventDefault();
        const username = document.getElementById("register-username").value;
        const email = document.getElementById("register-email").value;
        const password = document.getElementById("register-password").value;

        localStorage.setItem(email, JSON.stringify({ username, password }));
        alert("Account created successfully! You can now log in.");
        e.target.reset();
        showLogin.click();
      });

      document.getElementById("login-form").addEventListener("submit", e => {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const storedUser = JSON.parse(localStorage.getItem(email));

        if (storedUser && storedUser.password === password) {
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "/web2-ws25-4EverBloom/customer/home-page/home-page.html";
        } else {
          alert("Invalid email or password. Please try again.");
        }
      });
    </script>
  </body>
</html>
